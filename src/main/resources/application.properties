spring.application.name=hr-sass

server.port=8081

rsa.public-key=classpath:certs/public.pem
rsa.private-key=classpath:certs/private.pem
# Postgresql Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/hr-saas?createDatabaseIfNotExist=true
spring.datasource.username=shegami
spring.datasource.password=123456789
# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# Redis config
spring.data.redis.host=localhost
spring.data.redis.port=6379


spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.max-interval=10000ms
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.acknowledge-mode=auto