<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Invitation</title>
</head>
<body>
<h1>You're Invited!</h1>
<p>Hello <span th:text="${inviteeName}">Guest</span>,</p>
<p>You have been invited by <span th:text="${inviterName}">Host</span>.</p>
<p>Click the link below to accept your invitation:</p>
<a th:href="@{${invitationLink}}">Accept Invitation</a>
<p>This link will expire on <span th:text="${expiryDate}">date</span>.</p>
</body>
</html>
